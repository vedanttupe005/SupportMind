<!DOCTYPE html>
<html>

<head>

    <title>AI HelpCare</title>

    <style>

        body{
            font-family: Arial;
            background:#f5f5f5;
            margin:0;
        }

        /* top bar */

        #navbar{

            display:flex;

            justify-content:space-between;

            align-items:center;

            padding:15px 30px;

            background:white;

            box-shadow:0 2px 6px rgba(0,0,0,0.05);
        }

        #logo{

            font-size:20px;

            font-weight:bold;

        }

        #login-btn{

            background:#4CAF50;

            color:white;

            padding:8px 16px;

            border:none;

            border-radius:6px;

            cursor:pointer;

            text-decoration:none;
        }

        #login-btn:hover{

            background:#45a049;
        }

        /* chat */

        #chat-container{

            width:420px;

            margin:40px auto;

            background:white;

            border-radius:10px;

            box-shadow:0 0 10px rgba(0,0,0,0.1);

            padding:20px;
        }

        #chat{

            height:350px;

            overflow-y:auto;

            margin-bottom:10px;
        }

        .user{

            text-align:right;

            margin:8px 0;
        }

        .ai{

            text-align:left;

            margin:8px 0;
        }

        .bubble{

            display:inline-block;

            padding:10px 14px;

            border-radius:14px;

            max-width:70%;
        }

        .user .bubble{

            background:#4CAF50;

            color:white;
        }

        .ai .bubble{

            background:#e5e5ea;
        }

        #typing{

            font-style:italic;

            color:gray;

            display:none;

            margin-bottom:10px;
        }

        #input-area{

            display:flex;

            gap:10px;
        }

        #message{

            flex:1;

            padding:10px;
        }

        button{

            padding:10px 15px;
        }

        .ai.error .bubble {
    background: #fee2e2;
    color: #b91c1c;
}
    </style>

</head>


<body>


<!-- top navigation -->

<div id="navbar">

    <div id="logo">
        AI HelpCare
    </div>

    <div>

        {% if current_user.is_authenticated %}

            <span style="margin-right:15px;">
                Hello, {{ current_user.name }}
            </span>

            {% if current_user.role == "ADMIN" %}

                <a href="{{ url_for('admin_dashboard') }}"
                   id="login-btn"
                   style="background:#0275d8; margin-right:15px;">
                   Dashboard
                </a>

            {% endif %}

            <a href="{{ url_for('logout') }}"
               id="login-btn"
               style="background:#d9534f;">
               Logout
            </a>

        {% else %}

            <a href="{{ url_for('login') }}"
               id="login-btn">
               Login
            </a>

        {% endif %}

    </div>

</div>



<!-- chat container -->

<div id="chat-container">

<h3>AI Assistant</h3>

<div id="chat"></div>

<div id="typing">
    AI is typing...
</div>


<div id="input-area">

    <input
        type="text"
        id="message"
        placeholder="Ask about events..."
    >

    <button onclick="sendMessage()">
        Send
    </button>

</div>

</div>



<script src="/static/js/chat.js"></script>


</body>

</html>
