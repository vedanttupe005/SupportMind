<!DOCTYPE html>
<html>
<head>
    <title>AI HelpCare</title>

    <style>

        body{
            font-family: Arial;
            background:#f5f5f5;
        }

        #chat-container{
            width:420px;
            margin:40px auto;
            background:white;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
            padding:20px;
        }

        #chat{
            height:350px;
            overflow-y:auto;
            margin-bottom:10px;
        }

        .user{
            text-align:right;
            margin:8px 0;
        }

        .ai{
            text-align:left;
            margin:8px 0;
        }

        .bubble{
            display:inline-block;
            padding:10px 14px;
            border-radius:14px;
            max-width:70%;
        }

        .user .bubble{
            background:#4CAF50;
            color:white;
        }

        .ai .bubble{
            background:#e5e5ea;
        }

        #typing{
            font-style:italic;
            color:gray;
            display:none;
            margin-bottom:10px;
        }

        #input-area{
            display:flex;
            gap:10px;
        }

        #message{
            flex:1;
            padding:10px;
        }

        button{
            padding:10px 15px;
        }

    </style>

</head>

<body>

<div id="chat-container">

<h2>AI HelpCare Assistant</h2>

<div id="chat"></div>

<div id="typing">AI is typing...</div>

<div id="input-area">
    <input type="text" id="message" placeholder="Ask about events">
    <button onclick="sendMessage()">Send</button>
</div>

</div>

<script src="/static/js/chat.js"></script>

</body>
</html>
